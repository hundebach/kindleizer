name: Build Kindleizer Windows (PyQt6)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pyinstaller
        
    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --collect-all PyQt6 --add-data "k2pdfopt.exe;." --icon "icon.ico" --name "Kindleizer" arayuz.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kindleizer-Windows-EXE
        path: dist/Kindleizer.exe