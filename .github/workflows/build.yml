name: Build Kindleizer EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter tkinterdnd2 pyinstaller

    - name: Download K2pdfopt for Windows
      run: |
        Invoke-WebRequest -Uri "https://github.com/simonmeisel/k2pdfopt/releases/download/v2.55/k2pdfopt.exe" -OutFile "k2pdfopt.exe"
        
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "k2pdfopt.exe;." arayuz.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Kindleizer-Windows
        path: dist/arayuz/
