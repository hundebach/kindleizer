name: Build Kindleizer Mac DMG

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter tkinterdnd2 pyinstaller

    - name: Make k2pdfopt Executable
      run: chmod +x k2pdfopt

    - name: Build APP with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "k2pdfopt:." --icon "icon.icns" --name "Kindleizer" arayuz.py

    - name: Install create-dmg
      run: brew install create-dmg

    - name: Create DMG with Background
      run: |
        create-dmg \
          --volname "Kindleizer" \
          --background "dmg-bg.png" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "Kindleizer.app" 150 190 \
          --hide-extension "Kindleizer.app" \
          --app-drop-link 450 190 \
          "Kindleizer-Mac.dmg" \
          "dist/Kindleizer.app"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kindleizer-Mac-DMG
        path: Kindleizer-Mac.dmg